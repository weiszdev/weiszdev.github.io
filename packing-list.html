<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-Day Pack List</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #d4f500;
    --accent-dim: rgba(212,245,0,0.12);
    --text: #f0f0f0;
    --muted: #666;
    --done: #3a3a3a;
    --done-text: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    margin: 20px auto 0;
    max-width: 320px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  button.ctrl {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.ctrl:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.ctrl.reset {
    border-color: #ff4444;
    color: #ff4444;
  }
  button.ctrl.reset:hover {
    background: rgba(255,68,68,0.1);
  }

  .sections {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section.complete {
    border-color: var(--accent);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    transition: background 0.2s;
  }
  .section-header:hover {
    background: #272727;
  }

  .section-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    flex: 1;
  }

  .section-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    background: var(--border);
    padding: 3px 8px;
    border-radius: 20px;
  }
  .section.complete .section-count {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.25s;
  }
  .section.open .chevron {
    transform: rotate(180deg);
  }

  .items {
    display: none;
    padding: 4px 0 8px;
  }
  .section.open .items {
    display: block;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid transparent;
  }
  .item:hover {
    background: var(--surface2);
  }
  .item:last-child {
    border-bottom: none;
  }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 12px;
  }

  .item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .item-label {
    font-size: 14px;
    font-weight: 400;
    transition: color 0.2s;
    flex: 1;
  }

  .item.checked .item-label {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    color: var(--muted);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .add-row {
    display: flex;
    gap: 8px;
    padding: 8px 18px 12px;
  }
  .add-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-row input:focus {
    border-color: var(--accent);
  }
  .add-row input::placeholder { color: var(--muted); }
  .add-row button {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 18px;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .add-row button:hover {
    background: rgba(212,245,0,0.25);
  }

  .all-done-banner {
    display: none;
    text-align: center;
    padding: 20px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 10px;
    max-width: 640px;
    margin: 20px auto 0;
  }
  .all-done-banner.show { display: block; }
  .all-done-banner h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    letter-spacing: 3px;
  }
  .all-done-banner p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>PACK LIST</h1>
  <div class="subtitle">6-Day Trip · Jonathan</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 of 0 packed</div>
</header>

<div class="controls">
  <button class="ctrl" onclick="expandAll()">Expand All</button>
  <button class="ctrl" onclick="collapseAll()">Collapse All</button>
  <button class="ctrl" onclick="checkAll()">Check All</button>
  <button class="ctrl reset" onclick="resetAll()">↺ Reset</button>
</div>

<div class="sections" id="sectionsContainer"></div>

<div class="all-done-banner" id="doneBanner">
  <h2>YOU'RE PACKED.</h2>
  <p>Go get 'em. Everything's checked off.</p>
</div>

<script>
const data = [
  {
    id: "clothes",
    icon: "👕",
    title: "Clothes",
    items: [
      { label: "Shirts / Tees", tag: "×6" },
      { label: "Pants / Jeans", tag: "×2–3" },
      { label: "Shorts", tag: "×2" },
      { label: "Underwear", tag: "×7" },
      { label: "Socks", tag: "×7" },
      { label: "Nicer outfit (dinner / church)", tag: "×1" },
      { label: "Pajamas / Sleep clothes" },
      { label: "Hoodie / Light jacket" },
      { label: "Belt" },
      { label: "Shoes (everyday)" },
      { label: "Shoes (dress / alternate)" },
      { label: "Sandals or flip flops" },
    ]
  },
  {
    id: "supplements",
    icon: "💊",
    title: "Supplements",
    items: [
      { label: "Omega-3 / Fish oil (Dr. Sears protocol)" },
      { label: "Vitamin D3 + K2" },
      { label: "Magnesium" },
      { label: "Methylated B-complex" },
      { label: "Probiotics (travel-stable strain)" },
      { label: "NAC" },
      { label: "Methylene blue" },
      { label: "Colloidal silver (nebulizing supply)" },
      { label: "Vitamin C" },
      { label: "Zinc" },
      { label: "Any Rx / prescription meds", tag: "FIRST" },
      { label: "Supplement carrying case / organizer" },
    ]
  },
  {
    id: "toiletries",
    icon: "🪥",
    title: "Toiletries",
    items: [
      { label: "Toothbrush + toothpaste" },
      { label: "Deodorant" },
      { label: "Shampoo / body wash" },
      { label: "Razor + shaving gel" },
      { label: "Lip balm" },
      { label: "Nail clippers" },
      { label: "Q-tips (travel pack)" },
      { label: "Any skincare / face wash" },
    ]
  },
  {
    id: "food",
    icon: "🥗",
    title: "Food",
    items: [
      { label: "Snacks (bars, nuts, jerky)", tag: "pack" },
      { label: "Protein powder / travel packs" },
      { label: "Electrolyte packets" },
      { label: "Cooler + ice packs (if perishables)" },
      { label: "Travel utensils if needed" },
      { label: "Water bottle (empty, for travel)" },
    ]
  },
  {
    id: "gifts",
    icon: "🎁",
    title: "Gifts",
    items: [
      { label: "Gift #1 — packed & labeled", tag: "check" },
      { label: "Gift #2 — packed & labeled", tag: "check" },
      { label: "Gift #3 — packed & labeled", tag: "check" },
      { label: "Cards / notes included?" },
    ]
  },
  {
    id: "tech",
    icon: "🔌",
    title: "Tech & Power",
    items: [
      { label: "Phone + charger", tag: "FIRST" },
      { label: "Portable battery / power bank" },
      { label: "Laptop + charger (if needed)" },
      { label: "Earbuds / headphones" },
      { label: "Travel adapter (if needed)" },
      { label: "USB cable (extra)" },
    ]
  },
  {
    id: "documents",
    icon: "📄",
    title: "Documents & Essentials",
    items: [
      { label: "Wallet (ID, cards, cash)" },
      { label: "Phone" },
      { label: "Keys" },
      { label: "Any confirmation / reservation printouts" },
      { label: "Insurance card" },
    ]
  },
  {
    id: "lastcheck",
    icon: "✅",
    title: "Last Check Before Door",
    items: [
      { label: "Bag zipped and closed?" },
      { label: "Take a photo of everything on the bed" },
      { label: "Home locked / secured?" },
      { label: "Fridge cleared of perishables?" },
      { label: "Phone charged?" },
    ]
  },
];

// Pure in-memory state — no localStorage
// Each item in data[].items has a .checked boolean directly on it
// Sections track .open boolean directly too

data.forEach(s => {
  s.open = false;
  s.items.forEach(i => i.checked = false);
});

function renderAll() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  data.forEach(section => {
    const checkedCount = section.items.filter(i => i.checked).length;
    const total = section.items.length;
    const allDone = checkedCount === total;

    const div = document.createElement('div');
    div.className = 'section' + (allDone ? ' complete' : '') + (section.open ? ' open' : '');
    div.id = 'sec-' + section.id;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <span class="section-icon">${section.icon}</span>
        <span class="section-title">${section.title}</span>
        <span class="section-count">${checkedCount}/${total}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="items" id="items-${section.id}"></div>
    `;

    container.appendChild(div);

    const itemsEl = document.getElementById('items-' + section.id);
    section.items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'item' + (item.checked ? ' checked' : '');
      row.onclick = () => toggleItem(section.id, idx);
      row.innerHTML = `
        <div class="checkbox">${item.checked ? '✓' : ''}</div>
        <span class="item-label">${item.label}</span>
        ${item.tag ? `<span class="tag">${item.tag}</span>` : ''}
      `;
      itemsEl.appendChild(row);
    });

    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.innerHTML = `
      <input type="text" placeholder="Add item…" id="add-input-${section.id}" onkeydown="addOnEnter(event,'${section.id}')">
      <button onclick="addCustomItem('${section.id}')">+</button>
    `;
    itemsEl.appendChild(addRow);
  });

  updateProgress();
}

function toggleSection(id) {
  const section = data.find(s => s.id === id);
  section.open = !section.open;
  renderAll();
}

function toggleItem(sectionId, idx) {
  const section = data.find(s => s.id === sectionId);
  section.items[idx].checked = !section.items[idx].checked;
  renderAll();
}

function updateProgress() {
  let total = 0, checked = 0;
  data.forEach(s => s.items.forEach(i => { total++; if (i.checked) checked++; }));
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = checked + ' of ' + total + ' packed';
  const banner = document.getElementById('doneBanner');
  if (checked === total && total > 0) banner.classList.add('show');
  else banner.classList.remove('show');
}

function addCustomItem(sectionId) {
  const input = document.getElementById('add-input-' + sectionId);
  const label = input.value.trim();
  if (!label) return;
  const section = data.find(s => s.id === sectionId);
  if (section.items.find(i => i.label === label)) { input.value = ''; return; }
  section.items.push({ label, checked: false });
  section.open = true;
  input.value = '';
  renderAll();
}

function addOnEnter(e, sectionId) {
  if (e.key === 'Enter') addCustomItem(sectionId);
}

function expandAll() {
  data.forEach(s => s.open = true);
  renderAll();
}
function collapseAll() {
  data.forEach(s => s.open = false);
  renderAll();
}
function checkAll() {
  data.forEach(s => s.items.forEach(i => i.checked = true));
  renderAll();
}
function resetAll() {
  if (!confirm('Reset all checkboxes? Your custom items will stay.')) return;
  data.forEach(s => s.items.forEach(i => i.checked = false));
  renderAll();
}

renderAll();
</script>
</body>
</html>
